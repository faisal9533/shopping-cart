<app-block-map hidden></app-block-map>

<app-page-header [header]="'Contact Us'" [breadcrumbs]="[
    {label: 'Home',       url: '../../'},
    {label: 'Contact Us', url: ''}
]"></app-page-header>

<div class="block">
    <div class="container">
        <div class="card mb-0">
            <div class="card-body contact-us">
                <div class="contact-us__container">
                    <div class="row">
                        <div class="col-12 col-lg-6 pb-4 pb-lg-0">
                            <h4 class="contact-us__header card-title">Our Address</h4>

                            <div class="contact-us__address">
                                <p>
                                    {{ store?.address }}<br>
                                    Email: {{ store?.email }}<br>
                                    Phone Number: {{ store?.phone }}
                                </p>

                                <p>
                                    <strong>Opening Hours</strong><br>
                                    Monday to Sunday: {{ store?.hours }}<br>
                                
                                </p>

                                <p>

                                    <strong>Comment</strong><br>
                                    You can contact us give time feel free.
                                </p>
                            </div>
                        </div>

                        <div class="col-12 col-lg-6">
                            <h4 class="contact-us__header card-title">Leave us a Message</h4>

                            <form [formGroup]="contactform" (ngSubmit)="submitContactForm()">
                                <div class="form-row">
                                    <div class="form-group col-md-6">
                                        <label for="form-name">Your Name</label>
                                        <input type="text" id="form-name" formControlName="name"  class="form-control" placeholder="Your Name">
                                 
                                    </div>
                                    <div class="form-group col-md-6">
                                        <label for="form-email">Email</label>
                                        <input type="email" id="form-email"  formControlName="email"  class="form-control" placeholder="Email Address">
                                
                                    </div>
                                </div>
                                <div class="form-group">
                                    <label for="form-subject">Subject</label>
                                    <input type="text" id="form-subject"  formControlName="subject"  class="form-control" placeholder="Subject">
                           
                                </div>
                                <div class="form-group">
                                    <label for="form-message">Message</label>
                                    <textarea id="form-message"  formControlName="message"  class="form-control" rows="4"></textarea>
                         
                                </div>
                                <button type="submit" class="btn btn-primary" [disabled]="!contactform.valid" >Send Message</button>
                            </form>

                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
