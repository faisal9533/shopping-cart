<div class="row">
  <div class="col-12">
    <app-alert
      *ngIf="showAlert"
      class="mb-3"
      type="primary"
      size="lg"
      [dismissible]="true"
      (close)="showAlert = false"
    >
      {{ display_msg_update_profile }}
    </app-alert>
  </div>
</div>
<div class="card">
  <div class="card-header">
    <h5>Edit Profile</h5>
  </div>
  <div class="card-divider"></div>
  <div class="card-body">
    <div class="row no-gutters">
      <div class="col-12 col-lg-7 col-xl-6">
        <form [formGroup]="editProfileForm" (ngSubmit)="submitUpdateProfile()">
          <div class="form-group">
            <label for="profile-first-name">Full Name</label>
            <input
              type="text"
              class="form-control"
              formControlName="CustomerFullName"
              id="profile-first-name"
              placeholder="Full Name"
            />
            <div
              *ngIf="isSubmittedProfileUpdate && form.CustomerFullName.errors"
              class="text-danger"
            >
              <p *ngIf="form.CustomerFullName.errors.required">
                Please enter full name.
              </p>
            </div>
          </div>
          <div class="form-group">
            <label for="file">File</label>

            <input
            #fileUpload
            accept="image/*"
              formControlName="file"
              id="file"
              type="file"
              class="form-control"
              (change)="onFileChange($event)"
            />

            <div
              *ngIf="form.file.touched && form.file.invalid"
              class="alert alert-danger"
            >
              <div *ngIf="form.file.errors && form.file.errors.required">File is required.</div>
            </div>
          </div>
          <img [src]="imageSrc" *ngIf="imageSrc" style="height: 200px; width:200px">
          <!-- <div class="form-group">
            <label for="profile-first-name">CustomerImage</label>
            <input
              type="file"
              #fileUpload
              id="CustomerImage"
              formControlName="CustomerImage"
              accept="image/*"
            />
            <div *ngIf="isSubmittedProfileUpdate&&form.CustomerFullName.errors" class="text-danger">    
                            <p *ngIf="form.CustomerFullName.errors.required">Please enter full name.</p>    
                        </div> 
          </div> -->
          <div class="form-group">
            <label for="profile-email">Email Address</label>
            <input
              type="email"
              class="form-control"
              formControlName="CustomerEmail"
              id="profile-email"
              placeholder="Email Address"
              readonly
            />
          </div>
          <div class="form-group">
            <label for="profile-phone">Phone Number</label>
            <input
              type="text"
              class="form-control"
              formControlName="CustomerPhone"
              id="profile-phone"
              placeholder="Phone Number"
              readonly
            />
          </div>
          <div class="form-group">
            <label for="profile-phone">Password</label>
            <input
              type="password"
              class="form-control"
              formControlName="CustomerPassword"
              id="profile-phone"
              placeholder="Password"
            />
            <div
              *ngIf="isSubmittedProfileUpdate && form.CustomerPassword.errors"
              class="text-danger"
            >
              <p *ngIf="form.CustomerPassword.errors.required">
                Please enter password.
              </p>
              <p *ngIf="form.CustomerPassword.errors.minlength">
                Password must be at least 6 characters
              </p>
            </div>
          </div>
          <div class="form-group">
            <label for="profile-phone">GSTIN NO</label>
            <input
              type="text"
              class="form-control"
              formControlName="VatNo"
              placeholder="GSTIN"
            />
            <!-- <div
              *ngIf="isSubmittedProfileUpdate && form.PIN.errors"
              class="text-danger"
            >
              <p *ngIf="form.GSTIN.errors.required">Please enter GSTIN NO.</p>
            </div> -->
          </div>
          <div class="form-group mt-5 mb-0">
            <button class="btn btn-primary">Save</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
