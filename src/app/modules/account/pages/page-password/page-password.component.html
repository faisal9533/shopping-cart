<div class="card">
    <div class="card-header">
        <h5>Change Password</h5>
    </div>
    <div class="row">
        <div class="col-12">
            <app-alert *ngIf="showAlert" class="mb-3" type="primary" size="lg" [dismissible]="true" (close)="showAlert = false">
                {{display_changePassword}}
            </app-alert>
        </div>
    </div>
    <div class="card-divider"></div>
    <div class="card-body">
        <form  [formGroup]="changePasswordForm" (ngSubmit)="submitChangePassword()">
        <div class="row no-gutters">
            <div class="col-12 col-lg-7 col-xl-6"> 
                <div class="form-group">
                    <label for="password-current">Current Password</label>
                    <input type="password" formControlName="old_password" class="form-control" placeholder="Current Password">
                    <div *ngIf="isSubmittedForm&&form.old_password.errors" class="text-danger">    
                        <p *ngIf="form.old_password.errors.required">Please enter password.</p> 
                    </div>   
                </div>
              
                <div class="form-group">
                    <label for="password-new">New Password</label>
                    <input type="password" formControlName="newPassword" class="form-control" placeholder="New Password">
                    <div *ngIf="isSubmittedForm&&form.newPassword.errors" class="text-danger">    
                        <p *ngIf="form.newPassword.errors.required">Please enter password.</p> 
                    </div>   
                </div>
                <div class="form-group">
                    <label for="password-confirm">Reenter New Password</label>
                    <input type="password" formControlName="confirm_password" class="form-control" placeholder="Reenter New Password">
                    <div *ngIf="isSubmittedForm&&form.confirm_password.errors" class="text-danger">    
                        <p *ngIf="form.confirm_password.errors.required">Please enter Password.</p>
                        <p *ngIf="form.confirm_password.errors.mustMatch">Passwords must match</p>
                    </div>   
                </div>
                <div class="form-group mt-5 mb-0">
                    <button class="btn btn-primary">Change</button>
                </div>
            </div>
        </div>
        </form>
    </div>
</div>
