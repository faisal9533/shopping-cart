<div class="addresses-list">
    <a routerLink="./0" class="addresses-list__item addresses-list__item--new">
        <div class="addresses-list__plus"></div>
        <div class="btn btn-secondary btn-sm">Add New</div>
    </a>
    <div class="addresses-list__divider"></div>

    <ng-container *ngFor="let address of address_list">
        <div class="addresses-list__item card address-card">
            <div class="address-card__badge" *ngIf="address.DefaultAddress">Default</div>
            <div class="address-card__body">
                <div class="address-card__name">{{address.Alias}}</div>
                <div class="address-card__row">
                    {{ address.State }}<br>
                    {{ address.PinCode }}, {{ address.City }}<br>
                    {{ address.FullAddress }}
                </div>
                <div class="address-card__footer">
                    <a routerLink="./{{address.AddressKey}}">Edit</a>&nbsp;&nbsp;
                    <a style="color: #47991f; cursor: pointer;" (click)="removeAddress(address.AddressKey)">Remove</a>
                </div>
            </div>
        </div>
        <div class="addresses-list__divider"></div>
    </ng-container>
</div>
