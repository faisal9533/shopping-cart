<div class="card">
    <div class="card-header">
        <h5>Forgot Password</h5>
    </div>
    <div class="row">
        <div class="col-12">
            <app-alert *ngIf="showAlert" class="mb-3" type="primary" size="lg" [dismissible]="true" (close)="showAlert = false">
                {{display_forgotPassword}}  
                <!-- <p>Your PIN: {{display_pin}}</p> -->
            </app-alert>
        </div>
    </div>
    <div class="card-divider"></div>
    <div class="card-body">
        <form  [formGroup]="forgotForm" (ngSubmit)="submitForgotPassword()">
        <div class="row no-gutters">
            <div class="col-12 col-lg-7 col-xl-6"> 
                <div class="form-group">
                    <label>Mobile No</label>
                    <input type="text" formControlName="mobileNo" class="form-control" placeholder="Mobile No">
                    <div *ngIf="isSubmittedForm&&form.mobileNo.errors" class="text-danger">    
                        <p *ngIf="form.mobileNo.errors.required">Please enter mobile.</p>   
                        <p *ngIf="form.mobileNo.errors.pattern">Please enter valid mobile number.</p>   
                        <p *ngIf="form.mobileNo.errors.minlength">Please enter 10 digit mobile number.</p>   
                        <p *ngIf="form.mobileNo.errors.maxlength">Please enter 10 digit mobile number.</p>   
                    </div>   
                </div> 
                <div class="form-group mt-12 mb-0">
                    <button class="btn btn-primary">Submit</button>
                 
                    <a routerLink="/account/login" class="cart__calc-shipping m-1" style="cursor: pointer;" routerLinkActive="active">Login or Register</a>
                </div>
                
            </div>
        </div>
        </form>
    </div>
</div>
